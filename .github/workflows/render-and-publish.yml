on:
  push:
    branches: main

name: Render and Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6 
        
      - name: Set up R (needed for Rmd)
        uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y  \
          libcurl4-openssl-dev \
          libssl-dev \
          libxml2-dev \
          libv8-dev \
          libfontconfig1-dev \
          libfreetype6-dev \
          libharfbuzz-dev \
          libfribidi-dev \
          libpng-dev \
          libtiff5-dev \
          libjpeg-dev \
          libcairo2-dev \
          libgit2-dev \
          libnode-dev \
          libx11-dev \
          pandoc

      - name: Install R package dependencies (via pak)
        shell: Rscript {0}
        run: |
          install.packages("pak", repos = "https://cloud.r-project.org")

          # Install GitHub remotes first so auth/remote failures appear early.
          pak::pkg_install(
            c(
              "github::nmfs-ost/stockplotr",
              "github::noaa-afsc/SparseNUTS",
              "github::NOAA-FIMS/FIMS",
              "github::r4ss/r4ss@convert-data-to-fims"
            ),
            ask = FALSE,
            upgrade = FALSE
          )

          # Install CRAN dependencies after remotes succeed.
          pak::pkg_install(
            c(
              "cran::knitr",
              "cran::dplyr",
              "cran::ggplot2",
              "cran::ggridges",
              "cran::reshape2",
              "cran::remotes",
              "cran::shinystan",
              "cran::tidybayes",
              "cran::tidyr",
              "cran::TMB"
            ),
            ask = FALSE,
            upgrade = FALSE
          )

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      # add software dependencies here

      - name: Publish to GitHub Pages (and render)
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # this secret is always available for github actions
