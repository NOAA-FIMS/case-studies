on:
  push:
    branches: main

name: Render and Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
          R_REPOS: https://packagemanager.rstudio.com/cran/__linux__/jammy/latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4 
        
      - name: Set up R (needed for Rmd)
        uses: r-lib/actions/setup-r@v2
        with: 
          # use RStudio Public Package manager to prefer precompiled binaries
          use-public-rspm: true

      - name: Install system dependencies for R packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          libharfbuzz-dev \
          libfribidi-dev \
          libfreetype6-dev \
          libpng-dev \
          libtiff5-dev \
          libjpeg-dev \
          libxml2-dev \
          libcurl4-openssl-dev \
          libssl-dev \
          libgit2-dev

      - name: Determine renv profile
        id: profile
        run: |
          if [[ "${{ github.ref_name }}" == *"main"* ]] || [[ "${{ github.base_ref }}" == *"main"* ]]; then
            echo "profile=default" >> $GITHUB_OUTPUT
          else
            echo "profile=dev" >> $GITHUB_OUTPUT
          fi
      
      - name: Restore renv package cache
        uses: actions/cache@v3
        with:
          path: ~/.cache/R/renv
          key: ${{ runner.os }}-renv-${{ steps.profile.outputs.profile }}-${{ hashFiles('**/renv.lock', '**/renv/profiles/*/renv.lock') }}
          restore-keys: |
            ${{ runner.os }}-renv-${{ steps.profile.outputs.profile }}-
            ${{ runner.os }}-renv-
 
      - name: Activate and inspect renv profile
        run: |
          Rscript -e "install.packages('renv', repos = 'https://cloud.r-project.org')"

          profile="${{ steps.profile.outputs.profile }}"
          echo "Detected profile: $profile"

          if [[ "$profile" == "dev" ]]; then
            lockfile="/home/runner/work/case-studies/case-studies/renv/profiles/dev/renv.lock"
          else
            lockfile="/home/runner/work/case-studies/case-studies/renv/renv.lock"
          fi

          echo "Using lockfile: $lockfile"

          # Pass profile and lockfile as environment variables
          export PROFILE="$profile"
          export LOCKFILE="$lockfile"

          Rscript -e "source('./content/renv-profile.R')"

          Rscript -e '
            profile <- Sys.getenv("PROFILE")
            lockfile <- Sys.getenv("LOCKFILE")

            message("Using profile: ", profile)
            message("Using lockfile: ", lockfile)

            if (file.exists(lockfile)) {
              lock <- renv::lockfile_read(lockfile)
              cat("Read lockfile with", length(lock$Packages), "packages\n")

              if ("FIMS" %in% names(lock$Packages)) {
                pkg <- lock$Packages[["FIMS"]]
                cat("FIMS version:", pkg$Version, "\n")
                if (!is.null(pkg$RemoteRef)) cat("Git Ref:", pkg$RemoteRef, "\n")
                if (!is.null(pkg$RemoteRepo)) cat("Repository:", pkg$RemoteRepo, "\n")
              } else {
                cat("FIMS not found in lockfile\n")
              }
            } else {
              cat("Lockfile not found at:", lockfile, "\n")
            }
            renv::restore()
          '
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}        
        with:
          # To install LaTeX to build PDF book 
          tinytex: true 
          # uncomment below and fill to pin a version
          # version: 0.9.600
      
      # add software dependencies here

      - name: Publish to GitHub Pages (and render)
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # this secret is always available for github actions
